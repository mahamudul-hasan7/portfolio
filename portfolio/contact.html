<!DOCTYPE html>
<html lang="en">
<head>
  <script>
    (function() {
      try {
        var theme = localStorage.getItem('theme');
        if (theme !== 'light' && theme !== 'dark') {
          localStorage.setItem('theme', 'dark');
          theme = 'dark';
        }
        if (theme === 'light') {
          document.documentElement.classList.add('light');
        }
      } catch (e) {}
    })();
  </script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

            <svg width="16" height="16" viewBox="0 0 20 20" fill="none"><rect x="2.2" y="4" width="15.6" height="12" rx="2" stroke="currentColor" stroke-width="1.6"/><path d="M3.2 5.4L10 11l6.8-5.6" stroke="currentColor" stroke-width="1.6"/></svg>
          </a>
          <a href="#contactMessage" class="contact-rail-btn" title="Info" aria-label="Jump to message field">

          <div class="contact-template-grid">
            <div class="contact-template-form-col">
              <h1 class="contact-template-title">Let's <span>talk</span></h1>
              <p class="contact-template-lead">To request a quote or want to meet up for coffee, contact me directly or fill out the form and I will get back to you soon.</p>

              <form id="contactForm" class="contact-form contact-form-v2">
                <label class="contact-label" for="contactName">Your Name</label>
                <input id="contactName" type="text" name="name" placeholder="Your full name" required />

                <label class="contact-label" for="contactEmail">Your Email</label>
                <input id="contactEmail" type="email" name="email" placeholder="mahamud.7info@gmail.com" required />

                <label class="contact-label" for="contactMessage">Your Message</label>
                <textarea id="contactMessage" name="message" placeholder="Type your message here..." rows="5" required></textarea>

                <button type="submit" class="contact-submit-btn">Send Message</button>
              </form>
              <p id="contactSuccess" class="contact-success">Thanks! Your message was sent. I will get back to you soon.</p>
            </div>

            <div class="contact-template-visual-col">
              <div class="contact-template-blob"></div>
              <img src="contact.png" alt="Rakib contact visual" class="contact-template-photo" loading="lazy" />
              <div class="contact-template-overlay" aria-hidden="true"></div>
            </div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <script src="js/script.js"></script>

</html>
